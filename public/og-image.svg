<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#f0f0f0"/>
  
  <!-- Pattern overlay -->
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="rgba(0,0,0,0.05)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  
  <!-- Main card -->
  <rect x="50" y="50" width="500" height="530" fill="#FFE600" stroke="#000" stroke-width="6"/>
  <rect x="56" y="56" width="500" height="530" fill="none" stroke="#000" stroke-width="2" stroke-dasharray="10,5"/>
  
  <!-- Title text placeholder -->
  <rect x="80" y="100" width="440" height="80" fill="#000"/>
  <text x="300" y="155" font-family="Arial Black, sans-serif" font-size="48" fill="#FFE600" text-anchor="middle">PORTFOLIO</text>
  
  <!-- Subtitle -->
  <text x="300" y="240" font-family="Comic Sans MS, cursive" font-size="28" fill="#000" text-anchor="middle">Neo-Brutalism</text>
  <text x="300" y="280" font-family="Comic Sans MS, cursive" font-size="28" fill="#000" text-anchor="middle">×</text>
  <text x="300" y="320" font-family="Comic Sans MS, cursive" font-size="28" fill="#000" text-anchor="middle">Comic Book Style</text>
  
  <!-- Decorative elements -->
  <rect x="80" y="380" width="180" height="60" fill="#0066FF" stroke="#000" stroke-width="4"/>
  <text x="170" y="420" font-family="Arial Black, sans-serif" font-size="20" fill="#fff" text-anchor="middle">DESIGN</text>
  
  <rect x="280" y="380" width="180" height="60" fill="#FF6B9D" stroke="#000" stroke-width="4"/>
  <text x="370" y="420" font-family="Arial Black, sans-serif" font-size="20" fill="#000" text-anchor="middle">CODE</text>
  
  <!-- Right side decorative shapes -->
  <rect x="620" y="80" width="250" height="250" fill="#9D4EDD" stroke="#000" stroke-width="6"/>
  <rect x="650" y="100" width="60" height="60" fill="#FFE600" stroke="#000" stroke-width="3"/>
  <rect x="730" y="150" width="100" height="100" fill="#00E676" stroke="#000" stroke-width="3"/>
  
  <rect x="900" y="150" width="220" height="180" fill="#FF6D00" stroke="#000" stroke-width="6"/>
  
  <rect x="620" y="360" width="500" height="200" fill="#0066FF" stroke="#000" stroke-width="6"/>
  <text x="870" y="480" font-family="Arial Black, sans-serif" font-size="42" fill="#fff" text-anchor="middle">COMIC BRUTALISM</text>
</svg>
